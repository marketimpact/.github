name: Bug report
description: Report a reproducible defect.
title: "[bug] "
labels:
  - bug
body:
  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: What is broken, who is affected, and how severe is it?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the shortest path that reproduces the problem.
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Logs, screenshots, URLs, commit SHAs, or failing checks.
    validations:
      required: false
